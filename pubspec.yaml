name: chat_companion
description: "Chat Companion - Offline AI Assistant with local LLM inference"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Local LLM inference
  llama_cpp_dart: ^0.2.1
  # File handling
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  # HTTP for downloading models
  http: ^1.2.2
  # Shared preferences
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true
